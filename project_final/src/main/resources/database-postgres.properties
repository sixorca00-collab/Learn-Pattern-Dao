# ============================================================
# Perfil de base de datos: PostgreSQL
# Para activarlo: renombra (o copia) este archivo a database.properties
# ============================================================

# URL de conexión JDBC para PostgreSQL
# Formato: jdbc:postgresql://<host>:<puerto>/<nombre_bd>
db.url      = jdbc:postgresql://localhost:5432/appdb

# Usuario de la base de datos
db.user     = postgres

# Contraseña del usuario
db.password = 123456

# Clase del driver JDBC — debe estar en el pom.xml (org.postgresql:postgresql)
db.driver   = org.postgresql.Driver
