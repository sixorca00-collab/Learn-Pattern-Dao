# ============================================================
# Perfil de base de datos: MySQL
# Para activarlo: renombra (o copia) este archivo a database.properties
# ============================================================

# URL de conexión JDBC para MySQL
# Formato: jdbc:mysql://<host>:<puerto>/<nombre_bd>?<opciones>
# serverTimezone=UTC  → evita warning de zona horaria en MySQL 8+
# useSSL=false        → deshabilita SSL en entornos locales de desarrollo
db.url      = jdbc:mysql://localhost:3306/appdb?serverTimezone=UTC&useSSL=false

# Usuario de la base de datos
db.user     = root

# Contraseña del usuario
db.password = 123456

# Clase del driver JDBC — debe estar en el pom.xml (com.mysql:mysql-connector-j)
db.driver   = com.mysql.cj.jdbc.Driver
